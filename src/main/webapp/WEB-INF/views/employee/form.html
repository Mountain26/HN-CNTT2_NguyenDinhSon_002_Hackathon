<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin nhân viên</title>
    <style>
        body {display: flex; flex-direction: column; min-height: 1000px; }
        .form-group { margin: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="number"], select {
            width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 4px;
        }
        .error { color: red; font-size: 0.9em; margin-top: 5px; display: block; }
        .btn-save, .btn-cancel {
            padding: 10px 15px; border-radius: 4px; color: #fff; text-decoration: none; border: none;
        }
        .btn-save { cursor: pointer; color: black }
        .btn-cancel { background: #f44336; margin-left: 10px; }
        .current-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-top: 10px;}
    </style>

</head>
<body>
    <h2 th:text="${employeeReq.id == null ? 'Thêm nhân viên mới' : 'Cập nhật nhân viên'}"></h2>
    <form th:action="@{/employee/save}" th:object="${employeeReq}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{existingAvatar}" />

        <div class="form-group">
            <label>Họ và tên (*):</label>
            <input type="text" th:field="*{fullName}" />
            <span class="error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
        </div>

        <div class="form-group">
            <label>Chức vụ (*):</label>
            <select th:field="*{position}">
                <option value="">-- Chọn chức vụ --</option>
                <option value="Developer">Developer</option>
                <option value="Tester">Tester</option>
                <option value="PM">Project Manager</option>
            </select>
            <span class="error" th:if="${#fields.hasErrors('position')}" th:errors="*{position}"></span>
        </div>

        <div class="form-group">
            <label>Lương (*):</label>
            <input type="number" step="0.01" th:field="*{salary}" />
            <span class="error" th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></span>
        </div>

        <div class="form-group">
            <label>Ảnh đại diện:</label>
            <input type="file" th:field="*{avatarFile}" accept="image/png, image/jpeg" />

            <img class="current-avatar" th:if="${employeeReq.existingAvatar != null and employeeReq.existingAvatar != ''}"
                 th:src="@{'/uploads/' + ${employeeReq.existingAvatar}}" alt="Current Avatar" />
        </div>

        <button type="submit" class="btn-save">Lưu lại</button>
        <a th:href="@{/employee}" class="btn-cancel">Hủy</a>
    </form>
</body>
</html>
