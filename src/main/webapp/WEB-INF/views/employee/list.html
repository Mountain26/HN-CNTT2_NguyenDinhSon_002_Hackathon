<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách nhân viên</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; min-height: 730px; }
        header, footer { background: #eee; text-align: center; }
        main { flex: 1; padding: 20px; }
        .toolbar { display: flex; justify-content: space-between; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        a.btn { text-decoration: none; padding: 5px 10px; background: #ddd; color: #000; border-radius: 3px; }
    </style>
</head>
<header>
    <h2>Hệ thống Quản lý Nhân sự</h2>
</header>
<body>



<main>
    <div class="toolbar">
        <form th:action="@{/employee}" method="get">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Nhập tên, chức vụ..." style="padding:5px; width:200px;">
            <button type="submit" style="padding:5px;">Tìm</button>
        </form>
        <a th:href="@{/employee/add}" class="btn" style="background:#008CBA; color:white;">+ Thêm nhân viên</a>
    </div>

    <div th:if="${employees == null or #lists.isEmpty(employees)}" style="color:red; font-style:italic;">
        Không có dữ liệu nhân viên nào.
    </div>

    <table th:if="${employees != null and not #lists.isEmpty(employees)}">
        <thead>
            <tr>
                <th>Mã NV</th>
                <th>Ảnh đại diện</th>
                <th>Họ và tên</th>
                <th>Chức vụ</th>
                <th>Lương</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="emp : ${employees}">
                <td th:text="${emp.id}"></td>
                <td>
                    <img th:if="${emp.avatar != null and emp.avatar != ''}" th:src="@{'/uploads/' + ${emp.avatar}}" class="avatar"/>
                    <img th:unless="${emp.avatar != null and emp.avatar != ''}" th:src="@{/assets/avatar-default.png}" class="avatar"/>
                </td>
                <td th:text="${emp.fullName}"></td>
                <td th:text="${emp.position}"></td>
                <td th:text="${emp.salary}"></td>
                <td>
                    <a th:href="@{'/employee/edit/' + ${emp.id}}" class="btn">Sửa</a>
                    <a th:href="@{'/employee/delete/' + ${emp.id}}" class="btn" style="background:#f44336; color:white;" onclick="return confirm('Xóa nhân viên này?');">Xóa</a>
                </td>
            </tr>
        </tbody>
    </table>
</main>

</body>
<footer>
    <p>&copy; 2026 Quản lý Nhân sự</p>
</footer>
</html>
